name: Tests

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/tests.yml"
      - "CreateFeatureDoc.ipynb"
      - "tools/**/*.ipynb"
      - "tests/**"
      - "requirements-test.txt"
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - "CreateFeatureDoc.ipynb"
      - "tools/**/*.ipynb"
      - "tests/**"
      - "requirements-test.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade --requirement requirements-test.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v
